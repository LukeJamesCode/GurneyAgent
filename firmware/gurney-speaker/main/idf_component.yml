## IDF component manager — declares the external deps the firmware pulls in.
## Run `idf.py reconfigure` after editing to refresh the lockfile.
##
## Two components are intentionally NOT pulled yet:
##   - lvgl/lvgl                — re-add when the GC9A01 panel driver lands
##   - espressif/esp_audio_codec — re-add when Opus decoding replaces the
##                                  silence stub in audio_out.c
## Pulling them in unused would add ~30 MB of vendor source and 5+ min to a
## fresh build.

dependencies:
  idf:
    version: ">=5.1"

  # ESP-SR provides WakeNet (hotword) + the Audio Front End (AEC, AGC, NS).
  # Required for the "wake on 'Hi ESP'" trigger and for AEC during barge-in.
  # In v0.1 we ship without a model partition so esp-sr's init returns an
  # error and the firmware falls back to raw-stream mode — that's by design;
  # we keep the dependency so wakenet works as soon as a model is flashed.
  espressif/esp-sr: "^1.4.0"

  # WebSocket client for the connection to the Gurney server.
  espressif/esp_websocket_client: "^1.2.3"
